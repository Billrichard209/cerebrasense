run_name: oasis2_research_baseline
epochs: 30
device: auto
mixed_precision: true
deterministic: true
dry_run: false
model_config_path:

data:
  batch_size: 2
  gradient_accumulation_steps: 4
  num_workers: 2
  cache_rate: 0.0
  image_size: [96, 96, 96]
  seed: 42
  split_seed: 42
  train_fraction: 0.7
  val_fraction: 0.15
  test_fraction: 0.15
  weighted_sampling: true
  max_train_batches:
  max_val_batches:

optimizer:
  name: adamw
  learning_rate: 0.0003
  weight_decay: 0.01
  momentum: 0.9

scheduler:
  name: cosine
  step_size: 30
  gamma: 0.5
  patience: 5
  factor: 0.5

loss:
  name: focal_loss
  class_weights: [1.5, 1.0]
  focal_gamma: 2.0
  temporal_lambda: 0.5

early_stopping:
  enabled: true
  patience: 8
  min_delta: 0.001
  monitor: val_f1
  mode: max

checkpoint:
  resume_from:
  save_best: true
  save_last: true
