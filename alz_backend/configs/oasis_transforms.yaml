load:
  keys:
    - image
  reader: NibabelReader
  ensure_channel_first: true

orientation:
  enabled: true
  axcodes: RAS
  labels:
    - [L, R]
    - [P, A]
    - [I, S]

spacing:
  enabled: true
  pixdim: [1.0, 1.0, 1.0]
  mode: bilinear

intensity:
  percentile_lower: 1.0
  percentile_upper: 99.0
  output_min: 0.0
  output_max: 1.0
  clip: true
  normalize_nonzero: false

skull_strip:
  enabled: true
  strategy: crop_foreground
  source_key: image
  margin: [4, 4, 4]
  intensity_threshold: 0.0
  allow_smaller: true

spatial:
  spatial_size: [128, 128, 128]
  final_op: resize_with_pad_or_crop

augmentation:
  enabled: true
  affine_probability: 0.5
  rotate_range_degrees: [15.0, 15.0, 15.0]
  scale_range: [0.1, 0.1, 0.1]
  gaussian_noise_probability: 0.3
  gaussian_noise_std: 0.05
  bias_field_probability: 0.25
  bias_field_coeff_range: [0.0, 0.1]
  gibbs_noise_probability: 0.1
  gibbs_alpha: [0.0, 0.3]
  contrast_probability: 0.3
  contrast_gamma: [0.8, 1.2]
